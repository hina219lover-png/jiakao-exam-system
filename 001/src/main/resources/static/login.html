<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驾考系统 - 用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .link-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .link-text a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #f44336;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .success-message {
            color: #4caf50;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 驾考系统登录</h1>
        
        <div id="successMessage" class="success-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
                <div id="passwordError" class="error-message"></div>
            </div>
            
            <button type="submit" class="btn">登 录</button>
        </form>
        
        <div class="link-text">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8080/api/user';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const passwordError = document.getElementById('passwordError');
            const successMessage = document.getElementById('successMessage');
            
            // 隐藏错误和成功消息
            passwordError.style.display = 'none';
            successMessage.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    // 登录成功，保存用户信息
                    localStorage.setItem('userInfo', JSON.stringify(result.data));
                    successMessage.textContent = '登录成功！正在跳转...';
                    successMessage.style.display = 'block';
                    
                    // 延迟跳转到主页（这里先跳转到一个简单的欢迎页）
                    setTimeout(() => {
                        alert('登录成功！欢迎使用驾考系统');
                        // 后续可以跳转到主页：window.location.href = 'index.html';
                    }, 1000);
                } else {
                    // 登录失败
                    passwordError.textContent = result.message || '用户名或密码错误';
                    passwordError.style.display = 'block';
                }
            } catch (error) {
                passwordError.textContent = '网络错误，请稍后重试';
                passwordError.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
