# 服务器配置
server:
  port: 8080

# Spring 配置
spring:
  datasource:
    # 数据库连接信息
    url: jdbc:mysql://localhost:3306/jiakao?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP 连接池配置（Spring Boot 默认）
    hikari:
      minimum-idle: 5  # 最小空闲连接数
      maximum-pool-size: 20  # 最大连接池大小
      idle-timeout: 30000  # 空闲超时时间 (毫秒)
      pool-name: JiakaoHikariCP  # 连接池名称
      max-lifetime: 1800000  # 连接最大生命周期 (毫秒)
      connection-timeout: 30000  # 连接超时时间 (毫秒)
      connection-test-query: SELECT 1  # 测试查询

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  
  # 实体类包路径
  type-aliases-package: com.gzy.rpsm.jiakao.entity
  
  # 全局配置
  global-config:
    # 关闭 Banner
    banner: false
    db-config:
      # 主键类型（AUTO 自增）
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  
  # 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 开启日志打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.gzy.rpsm.jiakao: debug
    com.baomidou.mybatisplus: debug
